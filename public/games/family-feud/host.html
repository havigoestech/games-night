<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Feud - Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Setup */
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.4); font-size: 0.85rem; font-weight: 700; text-decoration: none; margin-bottom: 8px; }
    .back-link:hover { color: rgba(255,255,255,0.7); }
    .section-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; }
    .team-count-row { display: flex; align-items: center; gap: 16px; justify-content: center; margin-bottom: 20px; }
    .count-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .count-btn:hover { background: rgba(255,255,255,0.15); }
    .count-num { font-family: 'Fredoka', sans-serif; font-size: 2.5rem; font-weight: 700; min-width: 48px; text-align: center; }

    /* Lobby */
    .lobby-code-section { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
    .lobby-code-left { text-align: center; }
    .lobby-join-url { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; word-break: break-all; }
    #screen-lobby { justify-content: flex-start; padding-top: 32px; }
    .lobby-actions { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

    /* Game screen layout */
    #screen-game {
      justify-content: flex-start;
      padding-top: 16px;
      overflow-y: auto;
    }
    .ff-game-inner {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    /* Team score bars */
    .ff-teams-bar {
      display: flex;
      gap: 10px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ff-team-card {
      flex: 1;
      min-width: 120px;
      max-width: 200px;
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border: 2px solid transparent;
      transition: all 0.3s;
      position: relative;
    }
    .ff-team-card.active-team {
      border-color: currentColor;
      box-shadow: 0 0 24px currentColor;
    }
    .ff-team-card.steal-team {
      border-color: #FF9500;
      box-shadow: 0 0 24px rgba(255,149,0,0.6);
      animation: steal-pulse 1s ease-in-out infinite;
    }
    @keyframes steal-pulse {
      0%, 100% { box-shadow: 0 0 24px rgba(255,149,0,0.6); }
      50% { box-shadow: 0 0 40px rgba(255,149,0,0.9); }
    }
    .ff-team-badge-label {
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 20px;
      color: #fff;
    }
    .ff-team-badge-label.steal-badge { background: #FF9500; color: #111; }
    .ff-team-name-label { font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .ff-team-score-num { font-family: 'Fredoka', sans-serif; font-size: 2rem; font-weight: 700; line-height: 1; }

    /* Question banner */
    .ff-question-banner {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 18px 28px;
      width: 100%;
      text-align: center;
    }
    #ff-question {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    /* Board */
    #ff-board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      width: 100%;
    }

    /* Tiles */
    .ff-tile {
      height: 72px;
      perspective: 600px;
      cursor: default;
    }
    .ff-tile-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ff-tile.revealed .ff-tile-inner {
      transform: rotateY(180deg);
    }
    .ff-tile-front, .ff-tile-back {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .ff-tile-front {
      background: #1a3a6b;
      color: rgba(255,255,255,0.4);
      font-family: 'Fredoka', sans-serif;
      font-size: 2rem;
      font-weight: 700;
    }
    .ff-tile-back {
      background: #1e5c34;
      color: #FFD60A;
      transform: rotateY(180deg);
      padding: 8px 12px;
      justify-content: space-between;
      gap: 6px;
    }
    .ff-tile-back .ff-answer-text {
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-align: left;
      flex: 1;
      line-height: 1.3;
    }
    .ff-tile-back .ff-answer-pts {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Strikes */
    #ff-strikes {
      font-family: 'Fredoka', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #FF2D55;
      letter-spacing: 0.1em;
      min-height: 3rem;
      text-align: center;
    }

    /* Buzzed player display */
    .ff-buzzed-display {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      width: 100%;
      max-width: 480px;
    }
    .ff-buzzed-display.visible { display: flex; }
    .ff-buzzed-team-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .ff-buzzed-info { display: flex; flex-direction: column; align-items: flex-start; }
    .ff-buzzed-name { font-family: 'Fredoka', sans-serif; font-size: 1.1rem; font-weight: 700; }
    .ff-buzzed-team { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }

    /* Host controls section */
    .host-controls-section {
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 14px;
      margin-top: 4px;
    }
    .host-controls-label {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
      text-align: center;
    }
    #ff-reveal-btns {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .ff-reveal-answer-btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(30,92,52,0.25);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, opacity 0.15s;
    }
    .ff-reveal-answer-btn:hover { background: rgba(30,92,52,0.5); }
    .ff-reveal-answer-btn.used {
      opacity: 0.38;
      text-decoration: line-through;
      cursor: default;
      pointer-events: none;
    }
    .host-action-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn-wrong-answer {
      flex: 1;
      min-width: 140px;
      padding: 13px 16px;
      border: none;
      border-radius: 14px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      background: #FF2D55;
      color: #fff;
    }
    .btn-wrong-answer:active { transform: scale(0.96); }
    .btn-end-round-host {
      flex: 1;
      min-width: 140px;
      padding: 13px 16px;
      border: none;
      border-radius: 14px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
    }
    .btn-end-round-host:active { transform: scale(0.96); }
    .btn-end-game-sm {
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-family: 'Fredoka', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: color 0.15s;
    }
    .btn-end-game-sm:hover { color: #FF2D55; }

    /* Steal mode banner */
    .ff-steal-banner {
      display: none;
      width: 100%;
      background: rgba(255,149,0,0.15);
      border: 1px solid #FF9500;
      border-radius: 14px;
      padding: 14px 20px;
      text-align: center;
    }
    .ff-steal-banner.visible { display: block; }
    .ff-steal-banner-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #FF9500;
    }
    .ff-steal-banner-sub {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      font-weight: 600;
      margin-top: 4px;
    }

    /* Round over */
    #screen-round-over { justify-content: flex-start; padding-top: 32px; }
    .ff-round-over-inner { width: 100%; max-width: 700px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .ff-winner-badge {
      padding: 16px 32px;
      border-radius: 20px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      animation: glow-in 0.4s ease-out;
    }
    .ff-points-gained {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.2rem;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
    }
    #ro-reveal-board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
      width: 100%;
    }
    .ff-ro-tile {
      background: #1e5c34;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ff-ro-tile-text { font-size: 0.8rem; font-weight: 700; color: #FFD60A; flex: 1; text-align: left; line-height: 1.3; }
    .ff-ro-tile-pts { font-family: 'Fredoka', sans-serif; font-size: 1.3rem; font-weight: 700; color: #FFD60A; flex-shrink: 0; }

    /* Game over */
    #screen-game-over { justify-content: flex-start; padding-top: 40px; }
  </style>
</head>
<body>

  <!-- SETUP -->
  <div id="screen-setup" class="screen active col center gap-24">
    <div class="col center gap-8">
      <a href="/" class="back-link">← Games Night</a>
      <span style="font-size:3rem">🎯</span>
      <h1 class="heading" style="font-size:2.2rem">Family Feud</h1>
      <p style="color:var(--text-muted);font-size:0.95rem">Set up your teams, then share the room code.</p>
    </div>
    <div class="card col gap-16">
      <div>
        <div class="section-label">Number of Teams</div>
        <div class="team-count-row">
          <button class="count-btn" id="count-down">−</button>
          <div class="count-num" id="team-count-display">4</div>
          <button class="count-btn" id="count-up">+</button>
        </div>
      </div>
      <div>
        <div class="section-label">Team Names</div>
        <div id="team-name-inputs" class="col gap-8"></div>
      </div>
      <button class="btn btn-reveal mt-8" id="btn-create">Create Room</button>
      <div id="debug-log" style="font-size:0.75rem;color:#FF9500;min-height:1.2em;font-weight:700;text-align:center"></div>
    </div>
  </div>

  <!-- LOBBY -->
  <div id="screen-lobby" class="screen col center gap-16">
    <div class="lobby-code-section">
      <div class="lobby-code-left">
        <div class="section-label">Room Code</div>
        <div class="room-code" id="lobby-room-code">----</div>
        <div class="lobby-join-url" id="lobby-join-url"></div>
        <div id="lobby-player-address" style="font-size:0.85rem;color:#34C759;font-weight:700;margin-top:6px;background:rgba(52,199,89,0.12);border-radius:8px;padding:6px 12px"></div>
      </div>
      <div class="qr-wrap" id="lobby-qr" style="display:none">
        <img id="lobby-qr-img" width="160" height="160" alt="QR Code">
      </div>
    </div>
    <div style="width:100%;max-width:520px">
      <div class="section-label mb-8">Players (<span id="player-count">0</span>)</div>
      <div class="player-groups" id="player-groups"></div>
    </div>
    <div class="lobby-actions">
      <button class="btn btn-reveal" id="btn-start-game">Start Game</button>
      <button class="btn btn-ghost" id="btn-end-game-lobby" style="display:none">End Game</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen col center gap-0">
    <div class="ff-game-inner">

      <!-- Team score bars -->
      <div class="ff-teams-bar" id="ff-teams-bar"></div>

      <!-- Buzzed player display -->
      <div class="ff-buzzed-display" id="ff-buzzed-display">
        <div class="ff-buzzed-team-dot" id="ff-buzzed-dot"></div>
        <div class="ff-buzzed-info">
          <div class="ff-buzzed-name" id="ff-buzzed-name"></div>
          <div class="ff-buzzed-team" id="ff-buzzed-team-label"></div>
        </div>
      </div>

      <!-- Steal mode banner -->
      <div class="ff-steal-banner" id="ff-steal-banner">
        <div class="ff-steal-banner-title" id="ff-steal-banner-title">STEAL!</div>
        <div class="ff-steal-banner-sub" id="ff-steal-banner-sub"></div>
      </div>

      <!-- Question -->
      <div class="ff-question-banner">
        <div id="ff-question">Question will appear here</div>
      </div>

      <!-- Board -->
      <div id="ff-board"></div>

      <!-- Strikes -->
      <div id="ff-strikes"></div>

      <!-- HOST CONTROLS -->
      <div class="host-controls-section" style="width:100%;max-width:900px">
        <div class="host-controls-label">Host Controls</div>
        <div id="ff-reveal-btns"></div>
        <div class="host-action-row">
          <button class="btn-wrong-answer" id="btn-wrong">Wrong Answer ❌</button>
          <button class="btn-end-round-host" id="btn-end-round">End Round</button>
          <button class="btn-end-game-sm" id="btn-end-game-game">End Game</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ROUND OVER -->
  <div id="screen-round-over" class="screen col center gap-0">
    <div class="ff-round-over-inner">
      <div style="font-size:2rem">🎉</div>
      <div class="ff-winner-badge" id="ro-winner-badge"></div>
      <div class="ff-points-gained" id="ro-points-gained"></div>
      <div style="width:100%">
        <div class="section-label mb-8" style="text-align:left">All Answers</div>
        <div id="ro-reveal-board"></div>
      </div>
      <div style="width:100%">
        <div class="section-label mb-8" style="text-align:left">Scores</div>
        <div class="score-grid" id="ro-scores"></div>
      </div>
      <div class="lobby-actions">
        <button class="btn btn-reveal" id="btn-next-question">Next Question</button>
        <button class="btn btn-ghost" id="btn-end-game-roundover">End Game</button>
      </div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-game-over" class="screen col center gap-20">
    <div style="font-size:3rem">🏆</div>
    <h2 class="heading" style="font-size:2rem">Final Scores</h2>
    <div class="leaderboard" id="final-leaderboard"></div>
    <button class="btn btn-ghost mt-8" onclick="location.href='/'">Back to Games Night</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/games/family-feud/js/sounds.js"></script>
  <script src="/games/family-feud/js/host.js"></script>
</body>
</html>
