<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Feud - Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Setup */
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.4); font-size: 0.85rem; font-weight: 700; text-decoration: none; margin-bottom: 8px; }
    .back-link:hover { color: rgba(255,255,255,0.7); }
    .section-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; }

    /* Lobby */
    .lobby-code-section { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
    .lobby-code-left { text-align: center; }
    .lobby-join-url { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; word-break: break-all; }
    #screen-lobby { justify-content: flex-start; padding-top: 32px; }
    .lobby-actions { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

    /* Game screen layout */
    #screen-game {
      justify-content: flex-start;
      padding-top: 16px;
      overflow-y: auto;
    }
    .ff-game-inner {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    /* Team score bars */
    .ff-teams-bar {
      display: flex;
      gap: 10px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ff-team-card {
      flex: 1;
      min-width: 120px;
      max-width: 200px;
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border: 2px solid transparent;
      transition: all 0.3s;
      position: relative;
    }
    .ff-team-card.active-team {
      border-color: currentColor;
      box-shadow: 0 0 24px currentColor;
    }
    .ff-team-card.steal-team {
      border-color: #FF9500;
      box-shadow: 0 0 24px rgba(255,149,0,0.6);
      animation: steal-pulse 1s ease-in-out infinite;
    }
    @keyframes steal-pulse {
      0%, 100% { box-shadow: 0 0 24px rgba(255,149,0,0.6); }
      50% { box-shadow: 0 0 40px rgba(255,149,0,0.9); }
    }
    .ff-team-badge-label {
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 20px;
      color: #fff;
    }
    .ff-team-badge-label.steal-badge { background: #FF9500; color: #111; }
    .ff-team-name-label { font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .ff-team-score-num { font-family: 'Fredoka', sans-serif; font-size: 2rem; font-weight: 700; line-height: 1; }

    /* Question banner */
    .ff-question-banner {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 18px 28px;
      width: 100%;
      text-align: center;
    }
    #ff-question {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    /* Board */
    #ff-board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      width: 100%;
    }

    /* Tiles */
    .ff-tile {
      height: 72px;
      perspective: 600px;
      cursor: default;
    }
    .ff-tile-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ff-tile.revealed .ff-tile-inner {
      transform: rotateY(180deg);
    }
    .ff-tile-front, .ff-tile-back {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .ff-tile-front {
      background: #1a3a6b;
      color: rgba(255,255,255,0.4);
      font-family: 'Fredoka', sans-serif;
      font-size: 2rem;
      font-weight: 700;
    }
    .ff-tile-back {
      background: #1e5c34;
      color: #FFD60A;
      transform: rotateY(180deg);
      padding: 8px 12px;
      justify-content: space-between;
      gap: 6px;
    }
    .ff-tile-back .ff-answer-text {
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-align: left;
      flex: 1;
      line-height: 1.3;
    }
    .ff-tile-back .ff-answer-pts {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Strikes */
    #ff-strikes {
      font-family: 'Fredoka', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #FF2D55;
      letter-spacing: 0.1em;
      min-height: 3rem;
      text-align: center;
    }

    /* Pot chip */
    #ff-pot {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #FFD60A;
      background: rgba(255,214,10,0.12);
      border: 1px solid rgba(255,214,10,0.35);
      border-radius: 20px;
      padding: 6px 18px;
    }

    /* Phase status strip — who buzzed, whose counter, play/pass, steal */
    #ff-status {
      width: 100%;
      border-radius: 16px;
      padding: 14px 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      transition: border-color 0.3s, background 0.3s;
    }
    .ff-status-main {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
    }
    .ff-status-sub {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    .ff-status-buzzer-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* Play-or-pass buttons */
    .ff-pop-row { display: flex; gap: 12px; justify-content: center; margin-top: 12px; }
    .btn-pop {
      flex: 1;
      max-width: 200px;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      transition: transform 0.1s, opacity 0.15s;
    }
    .btn-pop:active { transform: scale(0.96); }
    .btn-pop.pass { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.8); }

    /* Host controls section */
    .host-controls-section {
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 14px;
      margin-top: 4px;
    }
    .host-controls-label {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
      text-align: center;
    }
    /* ── Answer key: the host sees every answer + points, always ── */
    #ff-answer-key {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .ff-key-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: opacity 0.2s, background 0.2s;
    }
    .ff-key-rank {
      font-family: 'Fredoka', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      width: 26px;
      flex-shrink: 0;
      text-align: center;
    }
    .ff-key-text {
      flex: 1;
      text-align: left;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }
    .ff-key-pts {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #FFD60A;
      flex-shrink: 0;
      min-width: 44px;
      text-align: right;
    }
    .btn-key-reveal {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(52,199,89,0.5);
      background: rgba(52,199,89,0.18);
      color: #34C759;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      min-width: 92px;
    }
    .btn-key-reveal:hover:not(:disabled) { background: rgba(52,199,89,0.35); }
    .btn-key-reveal:disabled { opacity: 0.3; cursor: not-allowed; }
    .ff-key-row.revealed { background: rgba(30,92,52,0.35); border-color: rgba(52,199,89,0.4); }
    .ff-key-row.revealed .ff-key-text { color: #FFD60A; }
    .ff-key-got {
      flex-shrink: 0;
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 5px 10px;
      border-radius: 20px;
      min-width: 92px;
      text-align: center;
      color: #fff;
    }
    .host-action-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn-wrong-answer:disabled, .btn-end-round-host:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-wrong-answer {
      flex: 1;
      min-width: 140px;
      padding: 13px 16px;
      border: none;
      border-radius: 14px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      background: #FF2D55;
      color: #fff;
    }
    .btn-wrong-answer:active { transform: scale(0.96); }
    .btn-end-round-host {
      flex: 1;
      min-width: 140px;
      padding: 13px 16px;
      border: none;
      border-radius: 14px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
    }
    .btn-end-round-host:active { transform: scale(0.96); }
    .btn-end-game-sm {
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-family: 'Fredoka', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: color 0.15s;
    }
    .btn-end-game-sm:hover { color: #FF2D55; }

    /* Round over */
    #screen-round-over { justify-content: flex-start; padding-top: 32px; }
    .ff-round-over-inner { width: 100%; max-width: 700px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .ff-winner-badge {
      padding: 16px 32px;
      border-radius: 20px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      animation: glow-in 0.4s ease-out;
    }
    .ff-points-gained {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.2rem;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
    }
    #ro-reveal-board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
      width: 100%;
    }
    .ff-ro-tile {
      background: #1e5c34;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ff-ro-tile-text { font-size: 0.8rem; font-weight: 700; color: #FFD60A; flex: 1; text-align: left; line-height: 1.3; }
    .ff-ro-tile-pts { font-family: 'Fredoka', sans-serif; font-size: 1.3rem; font-weight: 700; color: #FFD60A; flex-shrink: 0; }
    /* Unrevealed answers after the round — host can flip them for the room */
    .ff-ro-tile.hidden-tile { background: #1a3a6b; }
    .ff-ro-tile.hidden-tile .ff-ro-tile-text { color: rgba(255,255,255,0.75); }
    .btn-ro-show {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-ro-show:hover { background: rgba(255,255,255,0.2); }

    /* Game over */
    #screen-game-over { justify-content: flex-start; padding-top: 40px; }
  </style>
</head>
<body>

  <!-- SETUP -->
  <div id="screen-setup" class="screen active col center gap-24">
    <div class="col center gap-8">
      <a href="/" class="back-link">← Games Night</a>
      <span style="font-size:3rem">🎯</span>
      <h1 class="heading" style="font-size:2.2rem">Family Feud</h1>
      <p style="color:var(--text-muted);font-size:0.95rem">Two families, head to head. Name your teams and share the code.</p>
    </div>
    <div class="card col gap-16">
      <div>
        <div class="section-label">Team Names</div>
        <div id="team-name-inputs" class="col gap-8"></div>
      </div>
      <button class="btn btn-reveal mt-8" id="btn-create">Create Room</button>
      <div id="debug-log" style="font-size:0.75rem;color:#FF9500;min-height:1.2em;font-weight:700;text-align:center"></div>
    </div>
  </div>

  <!-- LOBBY -->
  <div id="screen-lobby" class="screen col center gap-16">
    <div class="lobby-code-section">
      <div class="lobby-code-left">
        <div class="section-label">Room Code</div>
        <div class="room-code" id="lobby-room-code">----</div>
        <div class="lobby-join-url" id="lobby-join-url"></div>
        <div id="lobby-player-address" style="font-size:0.85rem;color:#34C759;font-weight:700;margin-top:6px;background:rgba(52,199,89,0.12);border-radius:8px;padding:6px 12px"></div>
      </div>
      <div class="qr-wrap" id="lobby-qr" style="display:none">
        <img id="lobby-qr-img" width="160" height="160" alt="QR Code">
      </div>
    </div>
    <div style="width:100%;max-width:520px">
      <div class="section-label mb-8">Players (<span id="player-count">0</span>)</div>
      <div class="player-groups" id="player-groups"></div>
    </div>
    <div class="lobby-actions">
      <button class="btn btn-reveal" id="btn-start-game">Start Game</button>
      <button class="btn btn-ghost" id="btn-end-game-lobby" style="display:none">End Game</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen col center gap-0">
    <div class="ff-game-inner">

      <!-- Team score bars -->
      <div class="ff-teams-bar" id="ff-teams-bar"></div>

      <!-- Round pot -->
      <div id="ff-pot">Round pot: 0</div>

      <!-- Phase status: who buzzed / whose counter / play-or-pass / steal -->
      <div id="ff-status">
        <div class="ff-status-main" id="ff-status-main">Waiting…</div>
        <div class="ff-status-sub" id="ff-status-sub"></div>
        <div class="ff-pop-row" id="ff-pop-row" style="display:none">
          <button class="btn-pop" id="btn-play">PLAY the board</button>
          <button class="btn-pop pass" id="btn-pass">PASS to the other team</button>
        </div>
      </div>

      <!-- Question -->
      <div class="ff-question-banner">
        <div id="ff-question">Question will appear here</div>
      </div>

      <!-- Board (audience-facing mirror of what players see) -->
      <div id="ff-board"></div>

      <!-- Strikes -->
      <div id="ff-strikes"></div>

      <!-- HOST CONTROLS -->
      <div class="host-controls-section" style="width:100%;max-width:900px">
        <div class="host-controls-label">Answer Key — only you can see this</div>
        <div id="ff-answer-key"></div>
        <div class="host-action-row">
          <button class="btn-wrong-answer" id="btn-wrong">Not on the Board ❌</button>
          <button class="btn-end-round-host" id="btn-end-round">End Round</button>
          <button class="btn-end-game-sm" id="btn-end-game-game">End Game</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ROUND OVER -->
  <div id="screen-round-over" class="screen col center gap-0">
    <div class="ff-round-over-inner">
      <div style="font-size:2rem">🎉</div>
      <div class="ff-winner-badge" id="ro-winner-badge"></div>
      <div class="ff-points-gained" id="ro-points-gained"></div>
      <div style="width:100%">
        <div class="section-label mb-8" style="text-align:left">The Board — show the room what they missed</div>
        <div id="ro-reveal-board"></div>
      </div>
      <div style="width:100%">
        <div class="section-label mb-8" style="text-align:left">Scores</div>
        <div class="score-grid" id="ro-scores"></div>
      </div>
      <div class="lobby-actions">
        <button class="btn btn-reveal" id="btn-next-question">Next Question</button>
        <button class="btn btn-ghost" id="btn-end-game-roundover">End Game</button>
      </div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-game-over" class="screen col center gap-20">
    <div style="font-size:3rem">🏆</div>
    <h2 class="heading" style="font-size:2rem">Final Scores</h2>
    <div class="leaderboard" id="final-leaderboard"></div>
    <button class="btn btn-ghost mt-8" onclick="location.href='/'">Back to Games Night</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/games/family-feud/js/sounds.js"></script>
  <script src="/games/family-feud/js/host.js"></script>
</body>
</html>
